<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 540px;">
    <h2 class="mb-4">Add Transaction</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" min="0.01" name="amount"
                   class="form-control" placeholder="e.g. 500" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" id="category-select" class="form-select">
                <option value="">-- Select Category --</option>
                {% for cat in categories %}
                <option value="{{ cat['id'] }}">{{ cat['name'] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Subcategory</label>
            <select name="subcategory" id="subcategory-select" class="form-select">
                <option value="">-- Select Subcategory --</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Details</label>
            <input type="text" name="details" class="form-control" placeholder="Optional notes">
        </div>

        <div class="mb-4">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Add Transaction</button>
        <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
    </form>
</div>

<script>
    document.getElementById("category-select").addEventListener("change", function () {
        const categoryId = this.value;
        const subSelect  = document.getElementById("subcategory-select");

        subSelect.innerHTML = '<option value="">-- Select Subcategory --</option>';
        if (!categoryId) return;

        fetch(`/get_subcategories/${categoryId}`)
            .then(res => res.json())
            .then(data => {
                data.subcategories.forEach(sub => {
                    const opt = document.createElement("option");
                    opt.value       = sub.id;
                    opt.textContent = sub.name;
                    subSelect.appendChild(opt);
                });
            });
    });
</script>
</body>
</html>

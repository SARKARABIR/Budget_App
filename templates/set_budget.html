<!DOCTYPE html>
<html>
<head>
    <title>Set Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 480px;">
    <h2 class="mb-4">Set Monthly Budget</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Monthly Limit (₹)</label>
            <input type="number" step="0.01" min="0.01" name="limit"
                   class="form-control" placeholder="e.g. 20000" required>
            <div class="form-text">This will replace your current budget limit.</div>
        </div>

        <button type="submit" class="btn btn-success w-100">Save Budget</button>
        <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>

    </form>
</div>
</body>
</html>

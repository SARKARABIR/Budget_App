<!DOCTYPE html>
<html>
    <head>
        <title>Budget App</title>
    </head>
    <body>
        <h1>Personal Budget App</h1>
        <a href="/add">Add Transaction</a>
        <h2>Transactions</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Amount</th>
<th>Type</th>
<th>Category</th>
<th>Date</th>
<th>Description</th>
</tr>

{% for t in transactions %}

<tr>
<td>{{t[0]}}</td>
<td>{{t[1]}}</td>
<td>{{t[2]}}</td>
<td>{{t[3]}}</td>
<td>{{t[4]}}</td>
<td>{{t[5]}}</td>
</tr>

{% endfor %}

</table>
    </body>
</html>
